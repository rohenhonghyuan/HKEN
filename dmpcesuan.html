<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商利润自动核算工具 - 智能推演版</title>
    <!-- 引入 Tailwind CSS 框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 用于在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        /* 隐藏数字输入框的上下箭头 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const sanitizeNonNegativeInput = (value) => {
            if (value === '' || value === null || value === undefined) return '';
            const str = String(value).trim();
            if (str === '') return '';
            if (str === '-') return '0';
            const n = parseFloat(str);
            if (isNaN(n)) return '';
            return n < 0 ? '0' : str;
        };

        // 小组件：复用区间输入框 (支持多色彩主题)
        const RangeInput = ({ label, minVal, setMin, maxVal, setMax, suffix, step, color = 'blue', minSubtext, maxSubtext, precision = 4, normalizeOnBlur = false, disabled = false, disabledText = '', displayMultiplier = 1, displayPrecision = null, originalMin = '', originalMax = '' }) => {
            // 定义多套专属颜色主题
            const themes = {
                blue: { bg: 'bg-blue-50', border: 'border-blue-300', focus: 'focus:ring-blue-500', btnBg: 'bg-blue-100', btnHover: 'hover:bg-blue-200', text: 'text-blue-700', btnBorder: 'border-blue-200' },
                emerald: { bg: 'bg-emerald-50', border: 'border-emerald-300', focus: 'focus:ring-emerald-500', btnBg: 'bg-emerald-100', btnHover: 'hover:bg-emerald-200', text: 'text-emerald-700', btnBorder: 'border-emerald-200' },
                purple: { bg: 'bg-purple-50', border: 'border-purple-300', focus: 'focus:ring-purple-500', btnBg: 'bg-purple-100', btnHover: 'hover:bg-purple-200', text: 'text-purple-700', btnBorder: 'border-purple-200' },
                rose: { bg: 'bg-rose-50', border: 'border-rose-300', focus: 'focus:ring-rose-500', btnBg: 'bg-rose-100', btnHover: 'hover:bg-rose-200', text: 'text-rose-700', btnBorder: 'border-rose-200' },
                cyan: { bg: 'bg-cyan-50', border: 'border-cyan-300', focus: 'focus:ring-cyan-500', btnBg: 'bg-cyan-100', btnHover: 'hover:bg-cyan-200', text: 'text-cyan-700', btnBorder: 'border-cyan-200' },
                amber: { bg: 'bg-amber-50', border: 'border-amber-300', focus: 'focus:ring-amber-500', btnBg: 'bg-amber-100', btnHover: 'hover:bg-amber-200', text: 'text-amber-700', btnBorder: 'border-amber-200' },
                indigo: { bg: 'bg-indigo-50', border: 'border-indigo-300', focus: 'focus:ring-indigo-500', btnBg: 'bg-indigo-100', btnHover: 'hover:bg-indigo-200', text: 'text-indigo-700', btnBorder: 'border-indigo-200' },
            };
            const theme = themes[color] || themes.blue;

            const resolvedDisplayPrecision = displayPrecision === null ? precision : displayPrecision;

            const toDisplayValue = (value) => {
                if (value === '' || value === null || value === undefined) return '';
                const n = parseFloat(value);
                if (isNaN(n)) return value;
                return Number((n * displayMultiplier).toFixed(resolvedDisplayPrecision)).toString();
            };

            const fromDisplayValue = (value) => {
                if (value === '' || value === null || value === undefined) return '';
                const n = parseFloat(value);
                if (isNaN(n)) return value;
                return Number((n / displayMultiplier).toFixed(precision)).toString();
            };

            const isOutOfOriginalRange = (value) => {
                const n = parseFloat(value);
                const oMin = parseFloat(originalMin);
                const oMax = parseFloat(originalMax);
                if (isNaN(n) || isNaN(oMin) || isNaN(oMax)) return false;
                const low = Math.min(oMin, oMax);
                const high = Math.max(oMin, oMax);
                return n < low || n > high;
            };

            const minOutOfRange = isOutOfOriginalRange(minVal);
            const maxOutOfRange = isOutOfOriginalRange(maxVal);
            const labelIsAlert = minOutOfRange || maxOutOfRange;
            const alertInputClass = 'bg-red-50 border-red-400 text-red-600 focus:ring-red-500';
            const alertTextClass = 'text-red-600';

            const adjustMin = (amount) => {
                if (disabled) return;
                let n = parseFloat(toDisplayValue(minVal));
                if (isNaN(n)) n = 0;
                const next = Math.max(0, n + amount);
                setMin(fromDisplayValue(Number(next.toFixed(resolvedDisplayPrecision)).toString()));
            };

            const adjustMax = (amount) => {
                if (disabled) return;
                let n = parseFloat(toDisplayValue(maxVal));
                if (isNaN(n)) n = 0;
                const next = Math.max(0, n + amount);
                setMax(fromDisplayValue(Number(next.toFixed(resolvedDisplayPrecision)).toString()));
            };

            return (
                <div className={`flex flex-col ${disabled ? 'opacity-60' : ''}`}>
                    <label className={`text-xs font-bold mb-1 ${labelIsAlert ? alertTextClass : theme.text}`}>{label}</label>
                    <div className="grid grid-cols-[1fr_auto_1fr] items-start gap-1.5">
                        
                        {/* 左侧：下限输入与控制 */}
                        <div className="flex flex-col gap-1.5">
                            <div className="flex items-center gap-1">
                                <input type="number" min="0" disabled={disabled} className={`w-full min-w-0 p-1.5 border rounded-lg focus:ring-1 outline-none text-sm text-center ${minOutOfRange && !disabled ? alertInputClass : `${theme.border} ${theme.focus} ${theme.bg}`} ${disabled ? 'cursor-not-allowed bg-gray-100 text-gray-400 border-gray-200' : ''}`} placeholder="下限" value={toDisplayValue(minVal)} onChange={(e) => setMin(fromDisplayValue(sanitizeNonNegativeInput(e.target.value)))} onBlur={() => { if (minVal === '' || disabled) return; const n = Math.max(0, parseFloat(toDisplayValue(minVal))); if (!isNaN(n)) setMin(fromDisplayValue(Number(n.toFixed(resolvedDisplayPrecision)).toString())); }} />
                                {suffix && <span className={`text-xs font-bold shrink-0 ${minOutOfRange && !disabled ? alertTextClass : theme.text} opacity-80`}>{suffix}</span>}
                            </div>
                            {minSubtext && <div className={`text-[10px] text-center -mt-0.5 ${minOutOfRange && !disabled ? alertTextClass : theme.text} opacity-80`}>{minSubtext}</div>}
                            {step && (
                                <div className="flex gap-1 mt-4">
                                    <button disabled={disabled} onClick={() => adjustMin(-step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder} ${disabled ? 'cursor-not-allowed opacity-50 hover:bg-inherit' : ''}`}>-</button>
                                    <button disabled={disabled} onClick={() => adjustMin(step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder} ${disabled ? 'cursor-not-allowed opacity-50 hover:bg-inherit' : ''}`}>+</button>
                                </div>
                            )}
                        </div>

                        {/* 中间分隔符 (保持居中) */}
                        <div className="pt-2 flex items-center h-[34px]">
                            <span className={`font-bold shrink-0 ${labelIsAlert ? alertTextClass : theme.text} opacity-50`}>-</span>
                        </div>

                        {/* 右侧：上限输入与控制 */}
                        <div className="flex flex-col gap-1.5">
                            <div className="flex items-center gap-1">
                                <input type="number" min="0" disabled={disabled} className={`w-full min-w-0 p-1.5 border rounded-lg focus:ring-1 outline-none text-sm text-center ${maxOutOfRange && !disabled ? alertInputClass : `${theme.border} ${theme.focus} ${theme.bg}`} ${disabled ? 'cursor-not-allowed bg-gray-100 text-gray-400 border-gray-200' : ''}`} placeholder="上限" value={toDisplayValue(maxVal)} onChange={(e) => setMax(fromDisplayValue(sanitizeNonNegativeInput(e.target.value)))} onBlur={() => { if (maxVal === '' || disabled) return; const n = Math.max(0, parseFloat(toDisplayValue(maxVal))); if (!isNaN(n)) setMax(fromDisplayValue(Number(n.toFixed(resolvedDisplayPrecision)).toString())); }} />
                                {suffix && <span className={`text-xs font-bold shrink-0 ${maxOutOfRange && !disabled ? alertTextClass : theme.text} opacity-80`}>{suffix}</span>}
                            </div>
                            {maxSubtext && <div className={`text-[10px] text-center -mt-0.5 ${maxOutOfRange && !disabled ? alertTextClass : theme.text} opacity-80`}>{maxSubtext}</div>}
                            {step && (
                                <div className="flex gap-1 mt-4">
                                    <button disabled={disabled} onClick={() => adjustMax(-step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder} ${disabled ? 'cursor-not-allowed opacity-50 hover:bg-inherit' : ''}`}>-</button>
                                    <button disabled={disabled} onClick={() => adjustMax(step)} className={`flex-1 text-sm py-3 rounded-lg transition-colors font-bold leading-tight shadow-sm border ${theme.btnBg} ${theme.text} ${theme.btnHover} ${theme.btnBorder} ${disabled ? 'cursor-not-allowed opacity-50 hover:bg-inherit' : ''}`}>+</button>
                                </div>
                            )}
                        </div>

                    </div>
                    {disabled && disabledText && <div className="text-[10px] text-rose-500 mt-1">{disabledText}</div>}
                </div>
            );
        };

        function App() {
            const [pasteData, setPasteData] = useState('');
            const [margin, setMargin] = useState('');
            const [returnRate, setReturnRate] = useState('');
            const [newCustRate, setNewCustRate] = useState('100'); // 新增：新客占比，默认 100%
            const [monthlyFixedCost, setMonthlyFixedCost] = useState('');
            
            const [extDays, setExtDays] = useState('');
            const [extDateStr, setExtDateStr] = useState('');
            const [extPvMin, setExtPvMin] = useState('');
            const [extPvMax, setExtPvMax] = useState('');
            const [extCvrMin, setExtCvrMin] = useState('');
            const [extCvrMax, setExtCvrMax] = useState('');
            const [extTxnMin, setExtTxnMin] = useState('');
            const [extTxnMax, setExtTxnMax] = useState('');
            const [extAovMin, setExtAovMin] = useState('');
            const [extAovMax, setExtAovMax] = useState('');
            const [extClickMin, setExtClickMin] = useState('');
            const [extClickMax, setExtClickMax] = useState('');
            const [extPpcMin, setExtPpcMin] = useState('');
            const [extPpcMax, setExtPpcMax] = useState('');
            const [extRoiMin, setExtRoiMin] = useState('');
            const [extRoiMax, setExtRoiMax] = useState('');
            
            // 新增：快捷推算状态与原始提取数据缓存
            const [dailyRev, setDailyRev] = useState('');
            const [dailyPaid, setDailyPaid] = useState('');
            const [rawParsed, setRawParsed] = useState(null);
            const [txnControlMode, setTxnControlMode] = useState('base');
            const [txnLockedByCvr, setTxnLockedByCvr] = useState(false);

            const [analyzedData, setAnalyzedData] = useState(null);

            const adjustSingle = (setter, current, amount) => {
                const n = parseFloat(current);
                if (isNaN(n)) {
                    setter(Math.max(0, amount).toString());
                } else {
                    setter(Number(Math.max(0, n + amount).toFixed(4)).toString());
                }
            };

            const formatWan = (val, digits = 4) => {
                if (val === '' || val === null || val === undefined) return '';
                const num = parseFloat(val);
                if (isNaN(num)) return '';
                return parseFloat((num / 10000).toFixed(digits)).toString();
            };

            const formatPlain = (val, digits = 4) => {
                if (val === '' || val === null || val === undefined) return '';
                const num = parseFloat(val);
                if (isNaN(num)) return '';
                return parseFloat(num.toFixed(digits)).toString();
            };

            const splitRangeForDefault = (min, max, formatter = (v) => formatPlain(v)) => {
                let low = parseFloat(min);
                let high = parseFloat(max);
                if (isNaN(low) && isNaN(high)) return ['', ''];
                if (isNaN(low)) low = high;
                if (isNaN(high)) high = low;
                if (low > high) [low, high] = [high, low];
                if (low === high) {
                    const fixed = formatter(low);
                    return [fixed, fixed];
                }
                const lowerMedian = (low * 3 + high) / 4;
                const upperMedian = (low + high * 3) / 4;
                return [formatter(lowerMedian), formatter(upperMedian)];
            };

            const getRangeNumbers = (minState, maxState, multiplier = 1) => {
                const parseVal = (v) => {
                    if (v === '' || v === null || v === undefined) return NaN;
                    return parseFloat(v) * multiplier;
                };
                let min = parseVal(minState);
                let max = parseVal(maxState);
                if (isNaN(min) && isNaN(max)) return [NaN, NaN];
                if (isNaN(min)) min = max;
                if (isNaN(max)) max = min;
                if (min > max) [min, max] = [max, min];
                return [min, max];
            };

            const calcRoiRangeFromInputs = (txnMin, txnMax, aovMin, aovMax, clickMin, clickMax, ppcMin, ppcMax) => {
                const txn = getRangeNumbers(txnMin, txnMax, 10000);
                const aov = getRangeNumbers(aovMin, aovMax, 1);
                const click = getRangeNumbers(clickMin, clickMax, 10000);
                const ppc = getRangeNumbers(ppcMin, ppcMax, 1);
                if ([...txn, ...aov, ...click, ...ppc].some((v) => isNaN(v))) return ['', ''];

                const revenueMin = txn[0] * aov[0];
                const revenueMax = txn[1] * aov[1];
                const paidMin = click[0] * ppc[0];
                const paidMax = click[1] * ppc[1];
                if (paidMin <= 0 || paidMax <= 0) return ['', ''];

                let roiMin = revenueMin / paidMax;
                let roiMax = revenueMax / paidMin;
                if (roiMin > roiMax) [roiMin, roiMax] = [roiMax, roiMin];
                return [formatPlain(roiMin, 2), formatPlain(roiMax, 2)];
            };

            const calcTxnRangeFromRoiInputs = (roiMinState, roiMaxState, aovMinState, aovMaxState, clickMinState, clickMaxState, ppcMinState, ppcMaxState) => {
                let roiMin = parseFloat(roiMinState);
                let roiMax = parseFloat(roiMaxState);
                if (isNaN(roiMin) && isNaN(roiMax)) return ['', ''];
                if (isNaN(roiMin)) roiMin = roiMax;
                if (isNaN(roiMax)) roiMax = roiMin;
                if (roiMin > roiMax) [roiMin, roiMax] = [roiMax, roiMin];

                const aov = getRangeNumbers(aovMinState, aovMaxState, 1);
                const click = getRangeNumbers(clickMinState, clickMaxState, 10000);
                const ppc = getRangeNumbers(ppcMinState, ppcMaxState, 1);
                if ([...aov, ...click, ...ppc].some((v) => isNaN(v) || v <= 0)) return ['', ''];

                const paidMin = click[0] * ppc[0];
                const paidMax = click[1] * ppc[1];
                const revenueMin = roiMin * paidMax;
                const revenueMax = roiMax * paidMin;

                let txnMin = revenueMin / aov[0] / 10000;
                let txnMax = revenueMax / aov[1] / 10000;
                if (txnMin > txnMax) [txnMin, txnMax] = [txnMax, txnMin];
                return [formatPlain(txnMin), formatPlain(txnMax)];
            };

            const calcTxnRangeFromPvCvrInputs = (pvMinState, pvMaxState, cvrMinState, cvrMaxState) => {
                const pv = getRangeNumbers(pvMinState, pvMaxState, 10000);
                const cvr = getRangeNumbers(cvrMinState, cvrMaxState, 0.01);
                if ([...pv, ...cvr].some((v) => isNaN(v))) return ['', ''];
                let txnMin = pv[0] * cvr[0] / 10000;
                let txnMax = pv[1] * cvr[1] / 10000;
                if (txnMin > txnMax) [txnMin, txnMax] = [txnMax, txnMin];
                return [formatPlain(txnMin), formatPlain(txnMax)];
            };

            const calcPvRangeFromTrafficStructure = (clickMinState, clickMaxState, parsedSource) => {
                if (!parsedSource || !parsedSource.trafficShare) return ['', ''];

                let clickMin = parseFloat(clickMinState);
                let clickMax = parseFloat(clickMaxState);
                if (isNaN(clickMin) && isNaN(clickMax)) return ['', ''];
                if (isNaN(clickMin)) clickMin = clickMax;
                if (isNaN(clickMax)) clickMax = clickMin;
                if (clickMin > clickMax) [clickMin, clickMax] = [clickMax, clickMin];

                let paidShareMin = parseFloat(parsedSource.trafficShare.paidMin);
                let paidShareMax = parseFloat(parsedSource.trafficShare.paidMax);
                if (isNaN(paidShareMin) || paidShareMin <= 0 || paidShareMin >= 1) return ['', ''];
                if (isNaN(paidShareMax) || paidShareMax <= 0 || paidShareMax >= 1) return ['', ''];
                if (paidShareMin > paidShareMax) [paidShareMin, paidShareMax] = [paidShareMax, paidShareMin];

                let pvMin = clickMin / paidShareMin;
                let pvMax = clickMax / paidShareMax;
                if (pvMin > pvMax) [pvMin, pvMax] = [pvMax, pvMin];
                return [formatPlain(pvMin, 2), formatPlain(pvMax, 2)];
            };

            const handleCvrMinChange = (value) => {
                setTxnLockedByCvr(false);
                setTxnControlMode('cvr');
                setDailyRev('');
                setExtCvrMin(value);
            };

            const handleCvrMaxChange = (value) => {
                setTxnLockedByCvr(false);
                setTxnControlMode('cvr');
                setDailyRev('');
                setExtCvrMax(value);
            };

            const handleResetExtracted = () => {
                if (!rawParsed) return;
                setTxnControlMode('base');
                setTxnLockedByCvr(false);
                setDailyRev('');
                setDailyPaid('');
                setExtDays(rawParsed.days);
                setExtDateStr(rawParsed.dateStr);
                setExtPvMin(rawParsed.pv[0]);
                setExtPvMax(rawParsed.pv[1]);
                setExtCvrMin(rawParsed.cvr[0]);
                setExtCvrMax(rawParsed.cvr[1]);
                setExtTxnMin(rawParsed.txn[0]);
                setExtTxnMax(rawParsed.txn[1]);
                setExtAovMin(rawParsed.aov[0]);
                setExtAovMax(rawParsed.aov[1]);
                setExtClickMin(rawParsed.click[0]);
                setExtClickMax(rawParsed.click[1]);
                setExtPpcMin(rawParsed.ppc[0]);
                setExtPpcMax(rawParsed.ppc[1]);
                const [resetRoiMin, resetRoiMax] = calcRoiRangeFromInputs(
                    rawParsed.txn[0], rawParsed.txn[1],
                    rawParsed.aov[0], rawParsed.aov[1],
                    rawParsed.click[0], rawParsed.click[1],
                    rawParsed.ppc[0], rawParsed.ppc[1]
                );
                setExtRoiMin(resetRoiMin);
                setExtRoiMax(resetRoiMax);
            };

            // 智能提取数据逻辑
            useEffect(() => {
                if (!pasteData.trim()) return;
                const dateRegex = /(\d{4}[-/]\d{1,2}[-/]\d{1,2})\s*(?:至|-|~)\s*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/g;
                let match;
                let totalDays = 0;
                let dateStrings = [];
                while ((match = dateRegex.exec(pasteData)) !== null) {
                    dateStrings.push(`${match[1]} 至 ${match[2]}`);
                    const start = new Date(match[1]);
                    const end = new Date(match[2]);
                    const days = Math.round((end - start) / 86400000) + 1;
                    totalDays += days;
                }

                const extractRange = (keywords) => {
                    const lines = pasteData.split('\n').map(line => line.trim()).filter(Boolean);
                    let targetLine = '';
                    for (const line of lines) {
                        if (keywords.some((kw) => line.includes(kw))) {
                            targetLine = line;
                            break;
                        }
                    }
                    if (!targetLine) return ['', ''];

                    const normalizedLine = targetLine
                        .replace(/\t/g, ' ')
                        .replace(/[～—–－]/g, '~')
                        .replace(/(\d)\s+(?=[万亿%])/g, '$1')
                        .replace(/\s+/g, ' ')
                        .trim();

                    const rangeRegex = /(\d[\d,\.]*\s*[万亿%]?)(?:\s*[-~至]\s*(\d[\d,\.]*\s*[万亿%]?))?/g;
                    const matches = Array.from(normalizedLine.matchAll(rangeRegex)).filter((m) => /\d/.test(m[0]));
                    if (!matches.length) return ['', ''];

                    const lastMatch = matches[matches.length - 1];
                    let left = (lastMatch[1] || '').trim();
                    let right = (lastMatch[2] || '').trim();

                    const isPercentContext = normalizedLine.includes('%') || keywords.some(k => k.includes('率') || k.includes('占比'));

                    const parseNum = (s) => {
                        if (!s) return '';
                        let token = s.replace(/,/g, '').replace(/\s+/g, '').trim();
                        const hasPercent = token.includes('%');
                        token = token.replace(/%/g, '');
                        let num = parseFloat(token);
                        if (isNaN(num)) return '';
                        if (s.includes('亿')) num *= 100000000;
                        else if (s.includes('万')) num *= 10000;
                        if (hasPercent || (isPercentContext && !s.includes('万') && !s.includes('亿'))) {
                            if (!(num > 100 && !hasPercent)) num /= 100;
                        }
                        return num;
                    };

                    if (right) {
                        if (right.includes('亿') && !left.includes('亿') && !left.includes('万')) left += '亿';
                        if (right.includes('万') && !left.includes('万') && !left.includes('亿')) left += '万';
                        if (right.includes('%') && !left.includes('%')) left += '%';

                        let min = parseNum(left);
                        let max = parseNum(right);
                        if (min !== '' && max !== '' && min > max) [min, max] = [max, min];
                        return [min, max];
                    }

                    const val = parseNum(left);
                    return [val, val];
                };

                const rawPV = extractRange(['整体IPV', '整体PV', 'IPV', 'PV', '总流量', '访客']);
                const rawCVR = extractRange(['整体成交转化率', '成交转化率', '转化率', 'CVR']);
                const rawTxns = extractRange(['整体成交笔数', '成交笔数', '总笔数', '销量', '订单量']);
                const rawAOV = extractRange(['整体笔单价', '整体客单价', '笔单价', '客单价', 'AOV']);
                const clicks = extractRange(['付费点击量', '点击量', '付费点击', '推广点击']);
                const ppc = extractRange(['单次点击成本', 'PPC', '点击成本', '平均点击花费']);
                const rawNewCust = extractRange(['新客成交占比', '新客占比']); // 新增：提取新客占比
                const daysDivisor = totalDays > 0 ? totalDays : 1;
                const rawDailyPv = [rawPV[0] !== '' ? rawPV[0] / daysDivisor : '', rawPV[1] !== '' ? rawPV[1] / daysDivisor : ''];
                const rawDailyTxns = [rawTxns[0] !== '' ? rawTxns[0] / daysDivisor : '', rawTxns[1] !== '' ? rawTxns[1] / daysDivisor : ''];
                const rawDailyClicks = [clicks[0] !== '' ? clicks[0] / daysDivisor : '', clicks[1] !== '' ? clicks[1] / daysDivisor : ''];

                const parsedPv = [
                    rawDailyPv[0] !== '' ? formatWan(rawDailyPv[0], 2) : '',
                    rawDailyPv[1] !== '' ? formatWan(rawDailyPv[1], 2) : ''
                ];
                const parsedClick = [
                    rawDailyClicks[0] !== '' ? formatWan(rawDailyClicks[0], 2) : '',
                    rawDailyClicks[1] !== '' ? formatWan(rawDailyClicks[1], 2) : ''
                ];
                const paidShareMin = (() => {
                    const pv = parseFloat(parsedPv[0]);
                    const click = parseFloat(parsedClick[0]);
                    if (isNaN(pv) || pv <= 0 || isNaN(click) || click < 0) return '';
                    return Number((click / pv).toFixed(6));
                })();
                const paidShareMax = (() => {
                    const pv = parseFloat(parsedPv[1]);
                    const click = parseFloat(parsedClick[1]);

                    return Number((click / pv).toFixed(6));
                })();

                const parsed = {
                    days: totalDays || '',
                    dateStr: dateStrings.join(', '),
                    pv: parsedPv,
                    cvr: [
                        rawCVR[0] !== '' ? formatPlain(rawCVR[0] * 100) : '',
                        rawCVR[1] !== '' ? formatPlain(rawCVR[1] * 100) : ''
                    ],

                    ],

                    ],

                    ],

                        cvr: [rawCVR[0] !== '' ? formatPlain(rawCVR[0] * 100) : '', rawCVR[1] !== '' ? formatPlain(rawCVR[1] * 100) : ''],
                        txn: [rawDailyTxns[0] !== '' ? formatWan(rawDailyTxns[0]) : '', rawDailyTxns[1] !== '' ? formatWan(rawDailyTxns[1]) : ''],
                        aov: [rawAOV[0] !== '' ? formatPlain(rawAOV[0]) : '', rawAOV[1] !== '' ? formatPlain(rawAOV[1]) : ''],

                    }

                setRawParsed(parsed);

                setExtDays(parsed.days);
                setExtDateStr(parsed.dateStr);
                setTxnControlMode('base');

            }, [pasteData]);

            // 新增：快捷推算联动 - 日均营业额 -> 成交总笔数

            useEffect(() => {

                const [nextTxnMin, nextTxnMax] = calcTxnRangeFromRoiInputs(extRoiMin, extRoiMax, extAovMin, extAovMax, extClickMin, extClickMax, extPpcMin, extPpcMax);
                if (nextTxnMin === '' && nextTxnMax === '') return;

            useEffect(() => {

                setExtRoiMin(nextRoiMin);

            // 新增：快捷推算联动 - 日推广付费 -> 付费点击总量
            useEffect(() => {

                    let pMin = parseFloat(extPpcMin);

                    }
                } else if (rawParsed && dailyPaid === '') {

            }, [dailyPaid, extPpcMin, extPpcMax, extDays, rawParsed]);

            // 付费点击量变化后，按原始流量结构占比反推整体访客
            useEffect(() => {
                if (!rawParsed) return;
                const [nextPvMin, nextPvMax] = calcPvRangeFromTrafficStructure(extClickMin, extClickMax, rawParsed);
                if (nextPvMin === '' && nextPvMax === '') return;
                setExtPvMin(nextPvMin);
                setExtPvMax(nextPvMax);
            }, [extClickMin, extClickMax, rawParsed]);

            // 实时核算逻辑
            useEffect(() => {
                const days = parseFloat(extDays) || 0;
                if (days <= 0) { setAnalyzedData(null); return; }
                const getVal = (minState, maxState, multiplier = 1) => {
                    const parseVal = (v) => {
                        if (v === '' || v === null || v === undefined) return NaN;
                        return parseFloat(v) * multiplier;
                    };
                    let min = parseVal(minState); let max = parseVal(maxState);
                    if (isNaN(min) && isNaN(max)) return [0, 0];
                    if (isNaN(min)) min = max; if (isNaN(max)) max = min;
                    if (min > max) [min, max] = [max, min];
                    return [min, max];
                };

                const pv = getVal(extPvMin, extPvMax, 10000);
                const cvr = getVal(extCvrMin, extCvrMax, 0.01);
                const txns = getVal(extTxnMin, extTxnMax, 10000);
                const click = getVal(extClickMin, extClickMax, 10000);
                const aov = getVal(extAovMin, extAovMax, 1);
                const ppc = getVal(extPpcMin, extPpcMax, 1);

                if (aov[1] === 0) { setAnalyzedData(null); return; }

                let deducedTxnMin = txns[0], deducedTxnMax = txns[1], isCrossValidated = false;
                if (pv[1] > 0 && cvr[1] > 0 && txns[1] > 0) {
                    const calcMin = pv[0] * cvr[0], calcMax = pv[1] * cvr[1];
                    const overlapMin = Math.max(txns[0], calcMin), overlapMax = Math.min(txns[1], calcMax);
                    if (overlapMin <= overlapMax && overlapMax > 0) {
                        deducedTxnMin = overlapMin; deducedTxnMax = overlapMax; isCrossValidated = true;
                    }
                }
                if (txns[1] === 0 && pv[1] > 0 && cvr[1] > 0) {
                    deducedTxnMin = pv[0] * cvr[0]; deducedTxnMax = pv[1] * cvr[1]; isCrossValidated = true;
                }

                const dailyFixedCost = (parseFloat(monthlyFixedCost) || 0) / 30;
                const totalFixedCost = dailyFixedCost * days;

                const calculateTier = (dailyTxnVal, aovVal, dailyClickVal, ppcVal, cvrVal) => {
                    const marginRatio = (parseFloat(margin) || 0) / 100;
                    const returnRatio = (parseFloat(returnRate) || 0) / 100;
                    // 新增：提取新客占比
                    const ncr = newCustRate === '' ? 100 : parseFloat(newCustRate);
                    const newCustRatio = ncr / 100;
                    
                    const dailyRevenue = dailyTxnVal * aovVal;
                    const dailyActualRevenue = dailyRevenue - dailyRevenue * returnRatio;
                    const dailyGrossProfit = dailyActualRevenue * marginRatio;
                    const dailyPaid = dailyClickVal * ppcVal;
                    const dailyNetProfit = dailyGrossProfit - dailyPaid - dailyFixedCost;

                    const totalTxns = dailyTxnVal * days;
                    const totalRevenue = dailyRevenue * days;
                    const totalActualRevenue = dailyActualRevenue * days;
                    const totalPaid = dailyPaid * days;
                    const totalNetProfit = dailyNetProfit * days;

                    // 实际付费转化率
                    const adTxns = dailyClickVal * cvrVal; 
                    const paidCvr = dailyClickVal > 0 ? (adTxns / dailyClickVal) * 100 : 0;
                    
                    // 指标计算
                    const roi = dailyPaid > 0 ? (dailyRevenue / dailyPaid) : 0; // 1. 全店中位ROI (毛ROI)
                    const netRoi = dailyPaid > 0 ? (dailyActualRevenue / dailyPaid) : 0; // 2. 全店净有效ROI (GMV*(1-退货率)/付费)
                    
                    // 3. 广告净ROI (成交总笔数 × 新客占比 × 客单价 × (1 − 退货率) × 毛利率) ÷ 广告总花费
                    const adNetRoi = dailyPaid > 0 ? (dailyTxnVal * newCustRatio * aovVal * (1 - returnRatio) * marginRatio) / dailyPaid : 0; 
                    
                    const maxBreakevenPpc = aovVal * marginRatio * (1 - returnRatio) * cvrVal;
                    const breakevenRoi = (marginRatio > 0 && returnRatio < 1) ? 1 / (marginRatio * (1 - returnRatio)) : 0;

                    return {
                        aov: aovVal, totalTxns, totalRevenue, totalActualRevenue, totalPaid, totalNetProfit,
                        dailyTxns: dailyTxnVal, dailyRevenue, dailyActualRevenue, dailyPaid, dailyNetProfit,
                        monthlyTxns: dailyTxnVal * 30, monthlyRevenue: dailyRevenue * 30, monthlyActualRevenue: dailyActualRevenue * 30, monthlyPaid: dailyPaid * 30, monthlyNetProfit: dailyNetProfit * 30,
                        roi, netRoi, adNetRoi, maxBreakevenPpc, breakevenRoi, paidCvr
                    };
                };

                const conservative = calculateTier(deducedTxnMin, aov[0], click[1] || click[0], ppc[1] || ppc[0], cvr[0]);
                const optimistic = calculateTier(deducedTxnMax, aov[1], click[0], ppc[0], cvr[1]);
                const steady = calculateTier((deducedTxnMin + deducedTxnMax) / 2, (aov[0] + aov[1]) / 2, (click[0] + click[1]) / 2, (ppc[0] + ppc[1]) / 2, (cvr[0] + cvr[1]) / 2);

                // --- 实时同频诊断算法 (融合月度净利润全局视角) ---
                const marginRatio = (parseFloat(margin) || 0) / 100;
                const returnRatio = (parseFloat(returnRate) || 0) / 100;
                const currentRoi = steady.roi;
                const currentBreakevenRoi = steady.breakevenRoi;
                
                let actualPpc = (parseFloat(extPpcMin) + parseFloat(extPpcMax)) / 2;
                if (isNaN(actualPpc)) actualPpc = parseFloat(extPpcMin) || 0;
                const maxPpc = steady.maxBreakevenPpc;
                
                let actualCvr = (parseFloat(extCvrMin) + parseFloat(extCvrMax)) / 2;
                if (isNaN(actualCvr)) actualCvr = parseFloat(extCvrMin) || 0;
                
                const effectiveMargin = marginRatio * (1 - returnRatio) * 100;
                
                // 提取月度推演的核心终局指标
                const steadyMonthlyNet = steady.monthlyNetProfit;
                const consMonthlyNet = conservative.monthlyNetProfit;
                const steadyMonthlyRev = steady.monthlyRevenue;
                const netProfitMargin = steadyMonthlyRev > 0 ? (steadyMonthlyNet / steadyMonthlyRev) * 100 : 0;
                
                // 判断是否盈利（从单纯看变动成本的ROI，升级为看包含固定成本的最终月净利）
                const isVariableProfitable = currentRoi >= currentBreakevenRoi && currentBreakevenRoi > 0;
                const isNetProfitable = steadyMonthlyNet > 0;
                const isMicroProfit = isNetProfitable && (netProfitMargin < 5 || consMonthlyNet < 0);
                
                let profitStatus = !isNetProfitable ? "实质亏损" : (isMicroProfit ? "微利" : "盈利");
                
                // 评判健康评级 (结合净利润规模与抗风险能力)
                let grade = 'C';
                if (!isNetProfitable) grade = 'C';
                else if (isMicroProfit) grade = 'B';
                else if (netProfitMargin >= 15 && consMonthlyNet >= 0) grade = 'A+';
                else grade = 'A';
                
                // 放大策略
                let scaling = grade === 'C' ? '禁止放大' : (grade === 'B' ? '需优化后放大' : '可进一步放大');
                
                // 1. 核心风险点提取（改成更直白的表达）
                let allRisks = [];
                if (!isVariableProfitable) allRisks.push("广告投产还没过保本线，投得越多，亏得也可能越多");
                if (isVariableProfitable && !isNetProfitable) allRisks.push("广告端未必亏，但全店利润还不够覆盖固定成本");
                if (actualPpc > 0 && maxPpc > 0 && actualPpc >= maxPpc * 0.9) allRisks.push("点击单价已经很接近保本上限，继续加价空间很小");
                if (returnRatio >= 0.3) allRisks.push(`退货率偏高（${(returnRatio*100).toFixed(0)}%），会明显吃掉利润`);
                if (actualCvr < 1.0 && actualCvr > 0) allRisks.push(`转化率偏低（约${actualCvr.toFixed(2)}%），买来的流量接不太住`);
                if (isNetProfitable && consMonthlyNet < 0) allRisks.push("现在虽然赚钱，但安全垫不厚，数据稍差一点就可能转亏");
                if (allRisks.length === 0) allRisks.push("目前主要指标都在安全区间，暂时没有明显硬伤");
                const riskStr = allRisks.slice(0, 3).join("；");
                
                // 2. 详细诊断（改成更简单易懂）
                let mdaLines = [];
                if (actualPpc > 0 && maxPpc > 0) {

                else if (actualCvr > 0) mdaLines.push("转化端：成交转化率偏弱，说明流量进店后接不住，页面或价格力还有优化空间。");
                
                if (!isNetProfitable) {
                    mdaLines.push("利润端：按现在这套模型推算，最后大概率是亏钱的，说明规模没有真正转化成利润。");
                } else if (netProfitMargin < 5) {

                // 3. 针对性优化行动方向
                let advicesLines = [];
                if (grade === 'C' || grade === 'B') {
                    if (!isVariableProfitable || actualPpc >= maxPpc) advicesLines.push("降出价止血：立刻下调核心词PPC至极限保本线以下，暂停无转化的垃圾流量耗费。");
                    if (isVariableProfitable && !isNetProfitable) advicesLines.push("拉升总流盘：前端不亏钱但月总额亏损，说明订单基数太小，必须放大免费流量或增加日均投放预算摊平固定开支。");

                    if (actualCvr < 1.5) advicesLines.push("提升转化率：诊断流失链路，重构主图卖点排序，利用客服主动催付或大额满减券进行逼单。");
                } else {

                    advicesLines.push("防御固守：针对转化极佳的核心长尾词提高卡位溢价，防范竞品恶意低价劫持核心流量。");
                    if (returnRatio > 0.15) advicesLines.push("压榨纯利：若将退货率再向下压降2-3%，省下来的退货运费和货损都将1:1转化为实打实的纯利润。");
                }
                if(advicesLines.length < 3) advicesLines.push("建议常态化监控核心PPC与转化率波动，避免主观盲目决策。");
                
                const midPv = (pv[0] + pv[1]) / 2;
                const midClick = (click[0] + click[1]) / 2;
                const paidTrafficShare = midPv > 0 ? midClick / midPv : 0;
                let trafficType = '混合型';
                let trafficSummary = '自然流量和付费流量共同驱动成交，属于相对常见的综合经营模型。';
                if (paidTrafficShare <= 0.25) {
                    trafficType = '自然型';

                } else if (paidTrafficShare >= 0.55) {

                }

                let profitProbability = 0;
                if (conservative.monthlyNetProfit >= 0) profitProbability += 30;
                if (steady.monthlyNetProfit >= 0) profitProbability += 45;
                if (optimistic.monthlyNetProfit >= 0) profitProbability += 25;
                if (!isVariableProfitable) profitProbability = Math.max(0, profitProbability - 15);
                if (netProfitMargin >= 10 && consMonthlyNet >= 0) profitProbability = Math.min(100, profitProbability + 5);

                let profitProbabilityLevel = '低';
                let profitProbabilitySummary = '当前模型赚钱把握不高，更像“跑流水”而不是“稳定赚钱”。';
                if (profitProbability >= 75) {

                } else if (profitProbability >= 45) {
                    profitProbabilityLevel = '中';
                    profitProbabilitySummary = '模型具备赚钱可能，但对转化率、PPC 或退货率比较敏感。';
                }

                let modelType = '稳健经营型';
                let modelSummary = '模型已经具备一定健康度，可以继续围绕转化率与成本做精细化优化。';
                if (!isVariableProfitable) {
                    modelType = '高投放亏损型';
                    modelSummary = '广告投入已经击穿保本线，越放量越容易扩大亏损，不适合直接模仿。';
                } else if (isVariableProfitable && !isNetProfitable) {
                    modelType = '流水不养店型';
                    modelSummary = '前端投放未必直接亏，但总利润盘不足以覆盖固定成本，属于“有流水、没利润”。';
                } else if (isMicroProfit) {

                                                            </div>
                                                            <div className="bg-white/75 rounded-lg border border-white p-3">
                                                                <div className="text-xs text-gray-500 mb-1">店铺模型诊断</div>
                                                                <div className="font-bold text-base text-gray-900">{analyzedData.diag.modelType}</div>
                                                                <div className="text-xs text-gray-600 mt-2 leading-5">{analyzedData.diag.modelSummary}</div>
                                                            </div>
                                                            <div className="bg-white/75 rounded-lg border border-white p-3">
                                                                <div className="text-xs text-gray-500 mb-1">是否值得模仿</div>
                                                                <div className={`font-bold text-base ${analyzedData.diag.mimicLevel === '可以模仿' ? 'text-green-700' : (analyzedData.diag.mimicLevel === '可选择性模仿' || analyzedData.diag.mimicLevel === '谨慎模仿' ? 'text-orange-700' : 'text-red-700')}`}>{analyzedData.diag.mimicLevel}</div>
                                                                <div className="text-xs text-gray-600 mt-2 leading-5">{analyzedData.diag.mimicSummary}</div>
                                                            </div>
                                                        </div>


                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                            <div className={`p-3 rounded-lg border ${analyzedData.diag.grade === 'C' ? 'bg-red-100/50 border-red-200/60' : (analyzedData.diag.grade === 'B' ? 'bg-orange-100/50 border-orange-200/60' : 'bg-green-100/50 border-green-200/60')}`}>
                                                                <div className={`font-bold mb-1 ${analyzedData.diag.grade === 'C' ? 'text-red-900' : (analyzedData.diag.grade === 'B' ? 'text-orange-900' : 'text-green-900')}`}>核心风险</div>
                                                                <div className="text-sm text-gray-800 leading-6">{analyzedData.diag.riskStr}</div>
                                                            </div>
                                                            <div className="p-3 rounded-lg border bg-white/75 border-white">
                                                                <div className="font-bold mb-1 text-gray-900">关键判断</div>
                                                                <div className="text-sm text-gray-700 leading-6">
                                                                    保本ROI线 <span className="font-bold text-gray-900">{analyzedData.diag.breakevenRoi.toFixed(2)}</span>，
                                                                    实际ROI <span className={`font-bold ${analyzedData.diag.roi >= analyzedData.diag.breakevenRoi ? 'text-green-600' : 'text-red-600'}`}>{analyzedData.diag.roi.toFixed(2)}</span>，
                                                                    稳健月净利 <span className={`font-bold ${analyzedData.diag.monthlyNet >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatCurrency(analyzedData.diag.monthlyNet)}</span>，
                                                                    净利率 <span className={`font-bold ${analyzedData.diag.netProfitMargin >= 5 ? 'text-green-700' : 'text-orange-700'}`}>{analyzedData.diag.netProfitMargin.toFixed(1)}%</span>。
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div>
                                                            <div className="font-bold text-gray-900 mb-1.5">详细诊断</div>
                                                            <ul className="list-disc pl-5 text-gray-700 space-y-1.5">
                                                                {analyzedData.diag.mdaLines.map((line, i) => (
                                                                    <li key={i}>{line}</li>
                                                                ))}
                                                            </ul>
                                                        </div>

                                                        <div>
                                                            <div className="font-bold text-gray-900 block mb-1.5">建议怎么学 / 怎么改</div>
                                                            <ul className="list-decimal pl-5 text-blue-800 space-y-1.5 font-medium bg-white/50 p-3 rounded border border-white/70">
                                                                {analyzedData.diag.adviceLines.map((line, i) => (
                                                                    <li key={i} className="pl-1">{line}</li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </section>

                                        <section>
                                            <h3 className="font-bold text-base text-gray-700 mb-3 flex items-center gap-2">
                                                <span className="w-1 h-4 bg-gray-800 rounded"></span> 极限还原推演模型
                                            </h3>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                {['conservative', 'steady', 'optimistic'].map((tier, idx) => {
                                                    const titles = ['悲观 (承受底线)', '稳健 (常规预期)', '乐观 (理想状态)'];
                                                    const bgColors = ['bg-red-50/50', 'bg-blue-50/50', 'bg-green-50/50'];
                                                    const borderColors = ['border-red-200', 'border-blue-200', 'border-green-200'];
                                                    const textColors = ['text-red-800', 'text-blue-800', 'text-green-800'];
                                                    const data = analyzedData[tier];
                                                    const isProfit = data.monthlyNetProfit >= 0;
                                                    return (
                                                        <div key={tier} className={`border rounded-xl p-4 shadow-sm ${bgColors[idx]} ${borderColors[idx]}`}>
                                                            <div className={`font-bold text-center mb-3 pb-2 border-b border-gray-200/50 ${textColors[idx]}`}>{titles[idx]}</div>
                                                            <div className="mb-3 p-2 bg-white/60 rounded text-xs space-y-1.5 text-gray-600 border border-white">
                                                                <div className="flex justify-between"><span>推算客单:</span><span className="font-bold text-gray-800">{formatCurrency(data.aov)}</span></div>
                                                                <div className="flex justify-between"><span>月推算笔数:</span><span className="font-bold text-gray-800">{formatCount(data.monthlyTxns)}笔</span></div>
                                                                <div className="flex justify-between"><span>日推算笔数:</span><span className="font-bold text-blue-700">{formatCount(data.dailyTxns)}笔/天</span></div>
                                                            </div>
                                                            <div className="space-y-2 text-sm">
                                                                <div className="flex justify-between"><span>月营业额:</span><span className="font-semibold text-gray-800">{formatCurrency(data.monthlyRevenue)}</span></div>
                                                                <div className="flex justify-between"><span>月实际成交:</span><span className="font-semibold text-gray-800">{formatCurrency(data.monthlyActualRevenue)}</span></div>
                                                                <div className="flex justify-between"><span>月推广花费:</span><span className="font-semibold text-red-500">{formatCurrency(data.monthlyPaid)}</span></div>
                                                                <div className="pt-2 mt-2 border-t border-dashed border-gray-200/70 space-y-1 text-xs">
                                                                    <div className="flex justify-between"><span>日营业额:</span><span>{formatCurrency(data.dailyRevenue)}</span></div>
                                                                    <div className="flex justify-between"><span>日实际成交:</span><span>{formatCurrency(data.dailyActualRevenue)}</span></div>
                                                                    <div className="flex justify-between text-red-500"><span>日推广费:</span><span>{formatCurrency(data.dailyPaid)}</span></div>
                                                                    <div className="flex justify-between"><span>日净利润:</span><span className={data.dailyNetProfit >= 0 ? 'text-green-600' : 'text-red-500'}>{formatCurrency(data.dailyNetProfit)}</span></div>
                                                                </div>
                                                                <div className="flex justify-between items-center pt-3 border-t border-gray-200/50 mt-2">
                                                                    <span className="text-gray-900 font-bold">月净利润:</span>
                                                                    <span className={`font-black text-lg ${isProfit ? 'text-green-600' : 'text-red-600'}`}>{formatCurrency(data.monthlyNetProfit)}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </section>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
